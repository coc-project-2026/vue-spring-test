# kimsoran 애플리케이션 설정
# 신입 메모: 환경별 설정은 application-{profile}.yml 로 분리 가능

server:
  port: 8080

spring:
  application:
    name: kimsoran
  datasource:
    # 학습 편의를 위해 기본은 H2 in-memory
    # 실제 PostgreSQL 사용 시 아래 주석 참고
    url: jdbc:h2:mem:kimsoran;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
    # url: jdbc:postgresql://localhost:5432/kimsoran
    # driver-class-name: org.postgresql.Driver
    # username: kimsoran
    # password: kimsoran
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never

# JWT 설정 (운영에서는 환경변수로 주입)
app:
  jwt:
    secret: ${JWT_SECRET:kimsoran-learning-secret-please-change-in-production-32bytes!!}
    expires-in-seconds: 3600

# CORS (Vite 개발 서버)
cors:
  allowed-origins: "http://localhost:5173"

logging:
  level:
    org.springframework.security: DEBUG
